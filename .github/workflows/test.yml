name: Tests

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --locked
      - name: Validate the repository
        run: uv run python tests/validate.py
      - name: Test cross-reference linking
        run: uv run python tests/test_xref.py
      - name: Spell check
        run: uv run codespell
      - name: Install Vale
        env:
          VALE_VERSION: 3.12.0
        run: |
          curl -sSL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            | sudo tar -xz -C /usr/local/bin vale
      - name: Lint style (errors block, warnings inform)
        run: vale --minAlertLevel=error docs spec *.md
      - name: Build the site
        run: uv run zensical build --clean
