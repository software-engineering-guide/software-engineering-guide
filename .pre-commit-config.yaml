# Pre-commit hooks: the validation suite, codespell, and an em-dash grep on
# changed files. One-time setup (see CONTRIBUTING.md):
#
#   uv tool install pre-commit   # or: pip install pre-commit
#   pre-commit install
#
repos:
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        # read the [tool.codespell] config from pyproject.toml
        additional_dependencies: [tomli]

  - repo: local
    hooks:
      - id: no-em-dash
        name: no em-dashes (U+2014)
        language: pygrep
        entry: "—"
        types: [markdown]
        # files that document the style rules quote the banned character;
        # keep in sync with STYLE_EXEMPT in tests/validate.py
        exclude: ^(AGENTS\.md|docs/contributing/(testing|style-rules|index)\.md|spec/(conventions|index|README)\.md)$

      - id: validate
        name: validation suite (tests/validate.py)
        entry: python3 tests/validate.py
        language: system
        pass_filenames: false
        types_or: [markdown, python, toml]
