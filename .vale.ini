# Vale configuration for the house style (`just lint`, and the PR workflow).
# Errors encode the hard rules from docs/contributing/style-rules.md and fail
# CI; warnings flag filler and stock LLM wording for human judgement.
StylesPath = styles
MinAlertLevel = suggestion

[*.md]
BasedOnStyles = Guide

# These files document the style rules, so they quote the very tokens the
# rules forbid. Keep this list in sync with STYLE_EXEMPT in tests/validate.py.
[{AGENTS.md,docs/contributing/testing.md,docs/contributing/style-rules.md,spec/conventions.md,spec/index.md,spec/README.md,docs/contributing/index.md}]
BasedOnStyles =
